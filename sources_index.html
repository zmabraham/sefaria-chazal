<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפתח מקורות — לקוטי שיחות</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f6fb;
  color: #1a1a2e;
  direction: rtl;
  min-height: 100vh;
}

/* HEADER */
#header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #1a1a2e;
  color: white;
  padding: 10px 18px 6px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
#header h1 {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}
#header h1 span { color: #8ab4f8; font-size: 0.9rem; font-weight: 400; margin-right: 10px; }

#search-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
#search-input {
  flex: 1;
  padding: 6px 12px;
  border-radius: 20px;
  border: none;
  font-size: 0.95rem;
  direction: rtl;
  background: #2a2a4a;
  color: white;
  outline: none;
}
#search-input::placeholder { color: #8888aa; }
#search-input:focus { background: #3a3a6a; }
#count-badge {
  font-size: 0.8rem;
  color: #8ab4f8;
  white-space: nowrap;
}

/* CATEGORY TABS */
#cat-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 6px 18px 8px;
  background: #f4f6fb;
  border-bottom: 1px solid #dde3f0;
  position: sticky;
  top: 82px;
  z-index: 90;
}
.cat-tab {
  padding: 4px 12px;
  border-radius: 16px;
  border: 1.5px solid #c5cfe8;
  background: white;
  cursor: pointer;
  font-size: 0.82rem;
  color: #3a4a7a;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}
.cat-tab:hover { background: #e8eeff; border-color: #7a9ef8; }
.cat-tab.active {
  background: #2d3e8a;
  color: white;
  border-color: #2d3e8a;
}
.cat-tab .cnt {
  font-size: 0.72rem;
  opacity: 0.75;
  margin-right: 4px;
}

/* MAIN CONTENT */
#content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 18px 40px;
}

/* BOOK BLOCK */
.book-block {
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #dde3f0;
  background: white;
  overflow: hidden;
}
.book-header {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  cursor: pointer;
  background: #f0f4ff;
  border-bottom: 1px solid #dde3f0;
  transition: background 0.15s;
  user-select: none;
}
.book-header:hover { background: #e4eaff; }
.book-title {
  font-size: 1rem;
  font-weight: 700;
  color: #1a2a6a;
  flex: 1;
}
.book-count {
  font-size: 0.8rem;
  color: #5566aa;
  margin-left: 12px;
  padding: 2px 8px;
  background: #dde8ff;
  border-radius: 10px;
}
.toggle-arrow {
  font-size: 0.8rem;
  color: #7788bb;
  margin-right: 8px;
  transition: transform 0.2s;
}
.book-block.open .toggle-arrow { transform: rotate(90deg); }

.citations-table {
  display: none;
  width: 100%;
  border-collapse: collapse;
  font-size: 0.83rem;
}
.book-block.open .citations-table { display: table; }

.citations-table th {
  padding: 6px 12px;
  background: #f8f9ff;
  color: #5566aa;
  font-weight: 600;
  text-align: right;
  border-bottom: 1px solid #eee;
  font-size: 0.78rem;
}
.citations-table td {
  padding: 6px 12px;
  border-bottom: 1px solid #f0f0f8;
  vertical-align: top;
}
.citations-table tr:last-child td { border-bottom: none; }
.citations-table tr:hover td { background: #f8f9ff; }

.ref-cell { font-weight: 600; color: #2a3a7a; max-width: 200px; }
.sicha-link {
  color: #3a5aaa;
  text-decoration: none;
  font-size: 0.82rem;
}
.sicha-link:hover { text-decoration: underline; color: #1a3a8a; }
.vol-cell { color: #667799; font-size: 0.8rem; white-space: nowrap; }
.fn-cell {
  font-size: 0.78rem;
  color: #8899bb;
  text-align: center;
}
.raw-cell {
  color: #444466;
  font-size: 0.8rem;
  max-width: 280px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.role-badge {
  font-size: 0.7rem;
  padding: 1px 6px;
  border-radius: 8px;
  white-space: nowrap;
}
.role-badge.primary { background: #fff0d0; color: #885500; border: 1px solid #ffcc66; }
.role-badge.secondary { background: #eef5ff; color: #335588; border: 1px solid #aaccff; }

/* LOADING / EMPTY */
#loading { text-align: center; padding: 60px; color: #7788bb; font-size: 1.1rem; }
#empty-msg { text-align: center; padding: 40px; color: #9999bb; }

/* TOOLBAR */
#toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 12px;
}
#toolbar button {
  padding: 4px 14px;
  border-radius: 14px;
  border: 1.5px solid #c5cfe8;
  background: white;
  cursor: pointer;
  font-size: 0.82rem;
  color: #3a4a7a;
}
#toolbar button:hover { background: #e8eeff; }
#toolbar .spacer { flex: 1; }
#sort-label { font-size: 0.82rem; color: #7788bb; }
</style>
</head>
<body>

<div id="header">
  <h1>מפתח מקורות — לקוטי שיחות <span id="total-badge"></span></h1>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="חיפוש מקור, מסכת, פרק..." oninput="onSearch(this.value)">
    <span id="count-badge"></span>
  </div>
</div>

<div id="cat-tabs"></div>

<div id="content">
  <div id="loading">טוען מאגר מקורות…</div>
  <div id="toolbar" style="display:none">
    <button onclick="expandAll()">פתח הכל</button>
    <button onclick="collapseAll()">סגור הכל</button>
    <span class="spacer"></span>
    <span id="sort-label"></span>
  </div>
  <div id="books-container"></div>
  <div id="empty-msg" style="display:none">לא נמצאו מקורות</div>
</div>

<script>
// ─── Canonical ordering ───────────────────────────────────────────────────────

const TANACH_ORDER = [
  'Genesis','Exodus','Leviticus','Numbers','Deuteronomy',
  'Joshua','Judges','Samuel I','Samuel II','Kings I','Kings II',
  'Isaiah','Jeremiah','Ezekiel',
  'Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah','Haggai','Zechariah','Malachi',
  'Psalms','Proverbs','Job','Song of Songs','Ruth','Lamentations','Ecclesiastes','Esther',
  'Daniel','Ezra','Nehemiah','Chronicles I','Chronicles II'
];

const BAVLI_ORDER = [
  'Berakhot',
  'Shabbat','Eruvin','Pesachim','Shekalim','Yoma','Sukkah','Beitzah','Rosh Hashanah','Taanit','Megillah','Moed Katan','Chagigah',
  'Yevamot','Ketubot','Nedarim','Nazir','Sotah','Gittin','Kiddushin',
  'Bava Kamma','Bava Metzia','Bava Batra','Sanhedrin','Makkot','Shevuot','Avodah Zarah','Horayot',
  'Zevachim','Menachot','Chullin','Bekhorot','Arakhin','Temurah','Keritot','Meilah','Tamid','Middot','Kinnim',
  'Niddah'
];

const MISHNAH_ORDER = [
  'Mishnah Berakhot','Mishnah Peah','Mishnah Demai','Mishnah Kilayim','Mishnah Sheviit','Mishnah Terumot',
  'Mishnah Maasrot','Mishnah Maaser Sheni','Mishnah Challah','Mishnah Orlah','Mishnah Bikkurim',
  'Mishnah Shabbat','Mishnah Eruvin','Mishnah Pesachim','Mishnah Shekalim','Mishnah Yoma','Mishnah Sukkah',
  'Mishnah Beitzah','Mishnah Rosh Hashanah','Mishnah Taanit','Mishnah Megillah','Mishnah Moed Katan','Mishnah Chagigah',
  'Mishnah Yevamot','Mishnah Ketubot','Mishnah Nedarim','Mishnah Nazir','Mishnah Sotah','Mishnah Gittin','Mishnah Kiddushin',
  'Mishnah Bava Kamma','Mishnah Bava Metzia','Mishnah Bava Batra','Mishnah Sanhedrin','Mishnah Makkot',
  'Mishnah Shevuot','Mishnah Eduyot','Mishnah Avodah Zarah','Mishnah Avot','Mishnah Horayot',
  'Mishnah Zevachim','Mishnah Menachot','Mishnah Chullin','Mishnah Bekhorot','Mishnah Arakhin',
  'Mishnah Temurah','Mishnah Keritot','Mishnah Meilah','Mishnah Tamid','Mishnah Middot','Mishnah Kinnim',
  'Mishnah Kelim','Mishnah Ohalot','Mishnah Negaim','Mishnah Parah','Mishnah Tohorot',
  'Mishnah Mikvaot','Mishnah Niddah','Mishnah Makhshirin','Mishnah Zavim','Mishnah Tevul Yom','Mishnah Yadayim','Mishnah Oktzin'
];

const RAMBAM_ORDER = [
  'Mishneh Torah, Hilchot Yesodei HaTorah',
  'Mishneh Torah, Hilchot Deot',
  'Mishneh Torah, Hilchot Talmud Torah',
  'Mishneh Torah, Hilchot Avodat Kokhavim',
  'Mishneh Torah, Hilchot Teshuvah',
  'Mishneh Torah, Hilchot Keriat Shema',
  'Mishneh Torah, Hilchot Tefillah',
  'Mishneh Torah, Hilchot Tefillin',
  'Mishneh Torah, Hilchot Tzitzit',
  'Mishneh Torah, Hilchot Mezuzah',
  'Mishneh Torah, Hilchot Shabbat',
  'Mishneh Torah, Hilchot Yom Tov',
  'Mishneh Torah, Hilchot Chametz uMatzah',
  'Mishneh Torah, Hilchot Shofar',
  'Mishneh Torah, Hilchot Sukkah',
  'Mishneh Torah, Hilchot Chanukah',
  'Mishneh Torah, Hilchot Ishut',
  'Mishneh Torah, Hilchot Gerushin',
  'Mishneh Torah, Hilchot Sanhedrin',
  'Mishneh Torah, Hilchot Nizkei Mamon',
  'Mishneh Torah, Hilchot Rotzeach uShmirat Nefesh',
  'Mishneh Torah, Hilchot Mechirah',
  'Mishneh Torah, Hilchot Zechiyah uMattanah',
  'Mishneh Torah, Hilchot Shechitah',
  'Mishneh Torah, Hilchot Maakhalot Assurot',
  'Mishneh Torah, Hilchot Tumat Meit',
  'Mishneh Torah, Hilchot Mikvaot',
  'Mishneh Torah, Hilchot Beit HaBechirah',
  'Mishneh Torah, Hilchot Keilei HaMikdash',
  'Mishneh Torah, Hilchot Korbanot'
];

const TANYA_ORDER = [
  'Tanya, Likkutei Amarim',
  'Tanya, Shaar HaYichud VehaEmunah',
  'Tanya, Iggeret HaTeshuvah',
  'Tanya, Iggeret HaKodesh',
  'Tanya, Kuntres Acharon'
];

const CHASSIDUS_ORDER = [
  'Torah Ohr',
  'Likkutei Torah',
  'Maamarei Admur HaZaken',
  'Maamarei Admur HaEmtzai',
  'Hemshech Samech Vov',
  'Sefer HaMaamarim 5679','Sefer HaMaamarim 5680','Sefer HaMaamarim 5681','Sefer HaMaamarim 5682',
  'Sefer HaMaamarim 5683','Sefer HaMaamarim 5689','Sefer HaMaamarim 5700','Sefer HaMaamarim 5701',
  'Sefer HaMaamarim 5702','Sefer HaMaamarim 5703','Sefer HaMaamarim 5704','Sefer HaMaamarim 5705',
  'Sefer HaMaamarim 5706','Sefer HaMaamarim 5707','Sefer HaMaamarim 5708','Sefer HaMaamarim 5709',
  'Sefer HaMaamarim 5710','Sefer HaMaamarim 5711','Sefer HaMaamarim 5712','Sefer HaMaamarim 5713',
  'Sefer HaMaamarim 5714','Sefer HaMaamarim 5715','Sefer HaMaamarim 5716','Sefer HaMaamarim 5717',
  'Sefer HaMaamarim 5718','Sefer HaMaamarim 5719','Sefer HaMaamarim 5720',
  'Sefer HaMaamarim Melukat',
  'Basi LeGani',
  'Hemshech 5666'
];

const ZOHAR_ORDER = [
  'Zohar.1','Zohar.2','Zohar.3',
  'Tikkunei Zohar',
  'Zohar Chadash'
];

const MIDRASH_ORDER = [
  'Bereishit Rabbah','Shemot Rabbah','Vayikra Rabbah','Bamidbar Rabbah','Devarim Rabbah',
  'Shir HaShirim Rabbah','Ruth Rabbah','Eicha Rabbah','Kohelet Rabbah','Esther Rabbah',
  'Tanchuma','Tanchuma Buber',
  'Pirkei DeRabbi Eliezer','Midrash Tehillim','Yalkut Shimoni','Sifra','Sifre',
  'Mechilta','Mechilta DeRabbi Shimon bar Yochai'
];

// ─── Category metadata ────────────────────────────────────────────────────────

const CAT_META = {
  tanach:      { label: 'תנ"ך',         order: TANACH_ORDER   },
  bavli:       { label: 'תלמוד בבלי',   order: BAVLI_ORDER    },
  mishnah:     { label: 'משנה',          order: MISHNAH_ORDER  },
  yerushalmi:  { label: 'ירושלמי',       order: null           },
  midrash:     { label: 'מדרש',          order: MIDRASH_ORDER  },
  zohar:       { label: 'זוהר',          order: ZOHAR_ORDER    },
  rambam:      { label: 'רמב"ם',         order: RAMBAM_ORDER   },
  tanya:       { label: 'תניא',          order: TANYA_ORDER    },
  chassidus:   { label: 'חסידות',        order: CHASSIDUS_ORDER},
  halacha:     { label: 'הלכה',          order: null           },
  kabbalah:    { label: 'קבלה',          order: null           },
  commentary:  { label: 'פרשנים',        order: null           },
  targum:      { label: 'תרגום',         order: null           },
  tosefta:     { label: 'תוספתא',        order: null           },
  other:       { label: 'אחר',           order: null           }
};

const CAT_ORDER = ['tanach','bavli','mishnah','yerushalmi','midrash','zohar','rambam','tanya','chassidus','halacha','kabbalah','commentary','targum','tosefta','other'];

// ─── State ────────────────────────────────────────────────────────────────────

let allCitations = [];
let activeCat = 'tanach';
let searchQuery = '';
let catCounts = {};

// ─── Helpers ─────────────────────────────────────────────────────────────────

function bookSortKey(cat, work) {
  const meta = CAT_META[cat];
  if (!meta || !meta.order) return work || '';
  const idx = meta.order.findIndex(b => (work || '').startsWith(b));
  if (idx >= 0) return String(idx).padStart(4, '0') + work;
  return 'zzzz' + work;
}

function refSortKey(ref) {
  return (ref || '').replace(/(\d+)/g, n => n.padStart(6,'0'));
}

function citKey(c) {
  return ((c.category || '').split(';')[0].trim()) || 'other';
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sichaLink(c) {
  const sid = c.sicha_id || (c.page + '_' + c.volume);
  const fn = c.fn || '';
  return 'likkutei_sichos.html?s=' + encodeURIComponent(sid) + '&fn=' + fn;
}

// ─── Compute counts ───────────────────────────────────────────────────────────

function computeCounts() {
  catCounts = {};
  for (const c of allCitations) {
    const cat = citKey(c);
    catCounts[cat] = (catCounts[cat] || 0) + 1;
  }
}

// ─── Render tabs ─────────────────────────────────────────────────────────────

function renderTabs() {
  const container = document.getElementById('cat-tabs');
  container.innerHTML = '';
  for (const cat of CAT_ORDER) {
    const cnt = catCounts[cat] || 0;
    if (cnt === 0) continue;
    const meta = CAT_META[cat] || { label: cat };
    const div = document.createElement('div');
    div.className = 'cat-tab' + (cat === activeCat ? ' active' : '');
    div.onclick = () => setCat(cat);
    div.innerHTML = escHtml(meta.label) + ' <span class="cnt">' + cnt.toLocaleString() + '</span>';
    container.appendChild(div);
  }
}

// ─── Render books ─────────────────────────────────────────────────────────────

function renderBooks() {
  const container = document.getElementById('books-container');
  const toolbar = document.getElementById('toolbar');
  const emptyMsg = document.getElementById('empty-msg');

  // Filter by category + search
  const catTotal = catCounts[activeCat] || 0;
  let filtered = allCitations.filter(c => {
    if (citKey(c) !== activeCat) return false;
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return (c.work || '').toLowerCase().includes(q) ||
           (c.ref || '').toLowerCase().includes(q) ||
           (c.raw || '').includes(searchQuery) ||
           (c.title || '').toLowerCase().includes(q);
  });

  const badge = document.getElementById('count-badge');
  badge.textContent = (searchQuery && filtered.length !== catTotal)
    ? filtered.length.toLocaleString() + ' מתוך ' + catTotal.toLocaleString()
    : '';

  if (filtered.length === 0) {
    container.innerHTML = '';
    emptyMsg.style.display = '';
    toolbar.style.display = 'none';
    return;
  }
  emptyMsg.style.display = 'none';
  toolbar.style.display = 'flex';

  // Group by work
  const books = {};
  for (const c of filtered) {
    const book = c.work || '(ללא שם)';
    if (!books[book]) books[book] = [];
    books[book].push(c);
  }

  // Sort books canonically
  const sortedBooks = Object.keys(books).sort((a, b) => {
    return bookSortKey(activeCat, a).localeCompare(bookSortKey(activeCat, b));
  });

  document.getElementById('sort-label').textContent =
    sortedBooks.length + ' ספרים, ' + filtered.length.toLocaleString() + ' ציטוטים';

  container.innerHTML = '';

  for (const book of sortedBooks) {
    const cits = books[book].sort((a, b) => {
      const vd = (a.volume || 0) - (b.volume || 0);
      if (vd !== 0) return vd;
      const pd = (a.page || 0) - (b.page || 0);
      if (pd !== 0) return pd;
      return refSortKey(a.ref).localeCompare(refSortKey(b.ref));
    });

    const blockId = 'bb-' + book.replace(/[^a-z0-9]/gi, '_');
    const block = document.createElement('div');
    block.className = 'book-block';
    block.id = blockId;

    let rowsHtml = '';
    for (const c of cits) {
      const role = c.role || '';
      let roleBadge = '';
      if (role === 'מוסבר_ראשי') {
        roleBadge = '<span class="role-badge primary" title="' + escHtml(c.synopsis||'') + '">מוסבר ראשי</span>';
      } else if (role === 'מוסבר_טפל') {
        roleBadge = '<span class="role-badge secondary" title="' + escHtml(c.synopsis||'') + '">מוסבר טפל</span>';
      }

      const ref = c.ref || c.raw || '';
      const title = c.title || ('כרך ' + c.volume + ' עמ\' ' + c.page);
      const sLink = sichaLink(c);
      const raw = (c.raw || '').substring(0, 80);

      rowsHtml += '<tr>' +
        '<td class="ref-cell">' + escHtml(ref) + '</td>' +
        '<td><a class="sicha-link" href="' + escHtml(sLink) + '" target="_blank">' + escHtml(title) + '</a></td>' +
        '<td class="vol-cell">כרך ' + (c.volume||'?') + ' עמ\' ' + (c.page||'?') + '</td>' +
        '<td class="fn-cell">' + (c.fn||'') + '</td>' +
        '<td class="raw-cell" dir="rtl" title="' + escHtml(c.raw||'') + '">' + escHtml(raw) + '</td>' +
        '<td>' + roleBadge + '</td>' +
        '</tr>';
    }

    block.innerHTML =
      '<div class="book-header" onclick="toggleBook(\'' + escHtml(blockId) + '\')">' +
        '<span class="toggle-arrow">▶</span>' +
        '<span class="book-title">' + escHtml(book) + '</span>' +
        '<span class="book-count">' + cits.length + '</span>' +
      '</div>' +
      '<table class="citations-table">' +
        '<thead><tr>' +
          '<th>מקור</th>' +
          '<th>שיחה</th>' +
          '<th>כרך / עמוד</th>' +
          '<th>הערה</th>' +
          '<th>טקסט מקורי</th>' +
          '<th>תפקיד</th>' +
        '</tr></thead>' +
        '<tbody>' + rowsHtml + '</tbody>' +
      '</table>';

    container.appendChild(block);
  }
}

// ─── Controls ─────────────────────────────────────────────────────────────────

function setCat(cat) {
  activeCat = cat;
  renderTabs();
  renderBooks();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function onSearch(val) {
  searchQuery = val.trim();
  renderBooks();
}

function toggleBook(id) {
  const block = document.getElementById(id);
  if (block) block.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.book-block').forEach(b => b.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.book-block').forEach(b => b.classList.remove('open'));
}

// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  try {
    // Prefer classified data (has role + synopsis), fall back to base citations
    let resp = await fetch('citations_classified.json');
    if (!resp.ok) resp = await fetch('citations.json');
    if (!resp.ok) throw new Error('Failed to load citations');
    allCitations = await resp.json();
  } catch (e) {
    document.getElementById('loading').textContent = 'שגיאה בטעינת המאגר: ' + e.message;
    return;
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('total-badge').textContent = allCitations.length.toLocaleString() + ' ציטוטים';

  computeCounts();

  // Choose first non-empty category
  for (const cat of CAT_ORDER) {
    if (catCounts[cat] > 0) { activeCat = cat; break; }
  }

  renderTabs();
  renderBooks();
}

init();
</script>
</body>
</html>
