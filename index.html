<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מאמרים — אינדקס מפתח</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:       #c9a84c;
      --gold-light: #e8c96e;
      --gold-dim:   #a07830;
      --dark:       #0f1117;
      --surface:    #161b27;
      --surface2:   #1e2435;
      --surface3:   #252d40;
      --border:     #2e3650;
      --text:       #e8e8f0;
      --text-muted: #7a859e;
      --text-dim:   #4a5568;
      --accent:     #4a90d9;
      --accent2:    #6eb5ff;
      --green:      #48bb78;
      --radius:     10px;
      --radius-sm:  6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Heebo', 'Frank Ruhl Libre', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0d1120 0%, #161b2e 50%, #0d1120 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-ornament {
      color: var(--gold);
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .header h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      color: var(--gold-light);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .header h2 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .header-meta {
      display: inline-flex;
      gap: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .header-meta span { color: var(--gold); font-weight: 600; }

    /* ── Layout ── */
    .layout {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      gap: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 180px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 20px 12px;
      border-left: 1px solid var(--border);
      background: var(--surface);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      padding-right: 8px;
    }
    .year-btn {
      display: block;
      width: 100%;
      text-align: right;
      padding: 6px 10px;
      margin-bottom: 2px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .year-btn:hover { background: var(--surface2); color: var(--text); }
    .year-btn.active {
      background: rgba(201,168,76,0.12);
      color: var(--gold-light);
      font-weight: 600;
    }
    .year-btn .count {
      float: left;
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'Heebo', sans-serif;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      min-width: 0;
      padding: 20px 24px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 16px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 40px 10px 14px;
      color: var(--text);
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 15px;
      direction: rtl;
      transition: border-color 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--gold-dim); }
    .search-input::placeholder { color: var(--text-dim); }

    .filter-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 14px;
      cursor: pointer;
      direction: rtl;
    }
    .filter-select:focus { outline: none; border-color: var(--gold-dim); }

    .results-count {
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .results-count strong { color: var(--gold); }

    /* ── Table ── */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 12px 14px;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }
    th.col-id { width: 52px; text-align: center; }
    th.col-date { width: 180px; }
    th.col-dibur { width: 220px; }
    th.col-kuntres { min-width: 120px; }
    th.col-links { width: 260px; }

    tbody tr {
      border-bottom: 1px solid rgba(46,54,80,0.5);
      transition: background 0.12s;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody tr.expanded { background: rgba(201,168,76,0.04); }

    td {
      padding: 11px 14px;
      vertical-align: top;
    }
    td.col-id {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      width: 52px;
    }

    .date-cell { font-family: 'Frank Ruhl Libre', serif; font-size: 14px; }
    .year-tag {
      display: inline-block;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .dibur-cell {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }
    .dibur-extra {
      font-size: 12px;
      color: var(--gold-dim);
      font-weight: 400;
    }

    .kuntres-cell {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'Frank Ruhl Libre', serif;
    }

    /* Link pills */
    .links-cell { display: flex; flex-wrap: wrap; gap: 5px; }
    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .link-pill:hover { transform: translateY(-1px); }
    .pill-mugeh {
      background: rgba(72,187,120,0.12);
      color: var(--green);
      border: 1px solid rgba(72,187,120,0.25);
    }
    .pill-mugeh:hover { background: rgba(72,187,120,0.22); }
    .pill-bilti {
      background: rgba(74,144,217,0.12);
      color: var(--accent2);
      border: 1px solid rgba(74,144,217,0.25);
    }
    .pill-bilti:hover { background: rgba(74,144,217,0.22); }
    .pill-hagahos {
      background: rgba(201,168,76,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.2);
    }
    .pill-hagahos:hover { background: rgba(201,168,76,0.18); }
    .pill-other {
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* Expand row */
    .expand-row { display: none; }
    .expand-row.open { display: table-row; }
    .expand-row td {
      padding: 0 14px 16px 14px;
      background: rgba(201,168,76,0.03);
    }
    .expand-inner {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding-top: 8px;
    }
    .link-group { }
    .link-group-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .link-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 5px;
    }
    .link-item a {
      color: var(--accent2);
      text-decoration: none;
      font-size: 12.5px;
      line-height: 1.4;
      font-family: 'Frank Ruhl Libre', serif;
    }
    .link-item a:hover { text-decoration: underline; color: var(--gold-light); }
    .link-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .dot-mugeh { background: var(--green); }
    .dot-bilti { background: var(--accent2); }
    .dot-hagahos { background: var(--gold); }
    .dot-other { background: var(--text-dim); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .page-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
    .page-btn.active { background: rgba(201,168,76,0.15); color: var(--gold-light); border-color: var(--gold-dim); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-info { color: var(--text-dim); font-size: 13px; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--text-dim); text-decoration: none; }
    .footer a:hover { color: var(--gold); }

    /* ── Highlight ── */
    mark {
      background: rgba(201,168,76,0.25);
      color: var(--gold-light);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      th.col-kuntres, td:nth-child(4) { display: none; }
      th.col-links, td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-ornament">תורת מנחם</div>
  <h1>מאמרים</h1>
  <h2>אינדקס שלם — כ"ק אדמו"ר מליובאוויטש</h2>
  <div class="header-meta">
    <div>תשי"א – תשמ"ט</div>
    <div><span id="total-count">1,568</span> מאמרים</div>
    <div>מקור: <a href="https://www.mafteiach.app/maamorim" target="_blank" style="color:var(--gold-dim)">מפתח</a></div>
  </div>
  <div style="margin-top:0.75rem">
    <a href="chazal.html" style="display:inline-block;padding:0.35rem 1rem;border:1px solid var(--gold-dim);border-radius:20px;color:var(--gold);font-size:0.85rem;text-decoration:none;transition:background 0.2s" onmouseover="this.style.background='rgba(212,175,55,0.12)'" onmouseout="this.style.background=''">&larr; ספרי חז״ל</a>
  </div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">שנה</div>
    <button class="year-btn active" data-year="all" onclick="filterYear('all', this)">
      כל השנים <span class="count" id="cnt-all">1568</span>
    </button>
    <div id="year-buttons"></div>
  </aside>

  <main class="main">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input"
               placeholder="חיפוש — דיבור המתחיל, תאריך, קונטרס..."
               oninput="onSearch(this.value)" />
      </div>
      <select class="filter-select" id="link-filter" onchange="applyFilters()">
        <option value="all">כל המאמרים</option>
        <option value="mugeh">עם הנחה מוגה</option>
        <option value="bilti">עם הנחה בלתי מוגה</option>
        <option value="hagahos">עם הגהות</option>
      </select>
      <div class="results-count" id="results-count"></div>
    </div>

    <div class="table-wrap">
      <table id="main-table">
        <thead>
          <tr>
            <th class="col-id">#</th>
            <th class="col-date">תאריך</th>
            <th class="col-dibur">דיבור המתחיל</th>
            <th class="col-kuntres">קונטרס</th>
            <th class="col-links">קישורים</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>
</div>

<div class="footer">
  <a href="https://www.mafteiach.app/maamorim" target="_blank">mafteiach.app</a> ·
  נבנה עם ❤️ לכבוד תורת הרבי
</div>

// ── State ──
let filtered = [...MAAMORIM];
let currentYear = 'all';
let searchQuery = '';
let linkFilter = 'all';
let page = 1;
const PAGE_SIZE = 80;

// ── Year index ──
const yearMap = {};
MAAMORIM.forEach(m => {
  const y = extractYear(m.date);
  if (!yearMap[y]) yearMap[y] = [];
  yearMap[y].push(m);
});

function extractYear(date) {
  // Extract Hebrew year from date string like "יו"ד שבט תשי"א"
  const match = date.match(/תש[^\s"]+["']?[א-ת]|ת[א-ת]{2,4}["']?[א-ת]/);
  return match ? match[0] : date.split(' ').pop();
}

// ── Build year buttons ──
function buildYearButtons() {
  const container = document.getElementById('year-buttons');
  const years = Object.keys(yearMap).sort();
  container.innerHTML = years.map(y =>
    `<button class="year-btn" data-year="${y}" onclick="filterYear('${y}', this)">
      ${y} <span class="count">${yearMap[y].length}</span>
    </button>`
  ).join('');
}

// ── Filter by year ──
function filterYear(year, btn) {
  currentYear = year;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  page = 1;
  applyFilters();
}

// ── Search ──
let searchTimer;
function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = val.trim().toLowerCase();
    page = 1;
    applyFilters();
  }, 200);
}

// ── Apply all filters ──
function applyFilters() {
  linkFilter = document.getElementById('link-filter').value;

  filtered = MAAMORIM.filter(m => {
    // Year filter
    if (currentYear !== 'all' && extractYear(m.date) !== currentYear) return false;

    // Link filter
    if (linkFilter === 'mugeh' && !m.links.some(l => l.section.includes('מוגה') && !l.section.includes('בלתי'))) return false;
    if (linkFilter === 'bilti' && !m.links.some(l => l.section.includes('בלתי'))) return false;
    if (linkFilter === 'hagahos' && !m.links.some(l => l.section.includes('הגהות'))) return false;

    // Search
    if (searchQuery) {
      const haystack = [m.date, m.dibur, m.kuntres].join(' ').toLowerCase();
      if (!haystack.includes(searchQuery)) return false;
    }

    return true;
  });

  renderTable();
  renderPagination();
  updateCount();
}

// ── Highlight ──
function hl(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

// ── Render table ──
function renderTable() {
  const tbody = document.getElementById('table-body');
  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  if (slice.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div>לא נמצאו מאמרים</div>
    </div></td></tr>`;
    return;
  }

  const q = searchQuery;
  tbody.innerHTML = slice.map(m => {
    const mugeh = m.links.filter(l => l.section.includes('מוגה') && !l.section.includes('בלתי'));
    const bilti = m.links.filter(l => l.section.includes('בלתי'));
    const hag   = m.links.filter(l => l.section.includes('הגהות'));

    // Parse dibur / extra
    const diburMatch = m.dibur.match(/^(.*?)(\s*\[.*\])?$/);
    const diburMain = diburMatch ? diburMatch[1].trim() : m.dibur;
    const diburExtra = diburMatch && diburMatch[2] ? diburMatch[2].trim() : '';

    const pills = [
      ...mugeh.map((l,i) => `<a class="link-pill pill-mugeh" href="${l.url}" target="_blank" onclick="event.stopPropagation()">מוגה${mugeh.length>1?' '+(i+1):''}</a>`),
      ...bilti.map((l,i) => `<a class="link-pill pill-bilti" href="${l.url}" target="_blank" onclick="event.stopPropagation()">בלתי מוגה${bilti.length>1?' '+(i+1):''}</a>`),
      ...hag.map((l,i)   => `<a class="link-pill pill-hagahos" href="${l.url}" target="_blank" onclick="event.stopPropagation()">הגהות${hag.length>1?' '+(i+1):''}</a>`),
    ].join('');

    const kuntresClean = m.kuntres ? m.kuntres.replace(/^קונטרס:\s*/, '') : '';

    return `
      <tr onclick="toggleExpand(${m.id})" id="row-${m.id}">
        <td class="col-id">${m.id}</td>
        <td class="col-date"><div class="date-cell">${hl(m.date, q)}</div></td>
        <td class="col-dibur">
          <div class="dibur-cell">${hl(diburMain, q)}</div>
          ${diburExtra ? `<div class="dibur-extra">${diburExtra}</div>` : ''}
        </td>
        <td class="col-kuntres"><div class="kuntres-cell">${hl(kuntresClean, q)}</div></td>
        <td class="col-links"><div class="links-cell">${pills}</div></td>
      </tr>
      <tr class="expand-row" id="expand-${m.id}">
        <td colspan="5">${buildExpandContent(m)}</td>
      </tr>`;
  }).join('');
}

function buildExpandContent(m) {
  const groups = {};
  m.links.forEach(l => {
    if (!groups[l.section]) groups[l.section] = [];
    groups[l.section].push(l);
  });

  if (Object.keys(groups).length === 0) {
    return `<div class="expand-inner" style="color:var(--text-dim);font-size:13px;padding:8px 0">אין קישורים זמינים</div>`;
  }

  const sectionOrder = ['מוגה', 'בלתי מוגה', 'בלתי מוגה - מהדורה ישנה', 'הגהות'];
  const sortedKeys = [
    ...sectionOrder.filter(k => groups[k]),
    ...Object.keys(groups).filter(k => !sectionOrder.includes(k))
  ];

  return `<div class="expand-inner">` + sortedKeys.map(section => {
    const links = groups[section];
    const dotClass = section.includes('הגהות') ? 'dot-hagahos'
                   : section.includes('בלתי') ? 'dot-bilti'
                   : section.includes('מוגה') ? 'dot-mugeh' : 'dot-other';
    return `<div class="link-group">
      <div class="link-group-title">${section}</div>
      ${links.map(l => `
        <div class="link-item">
          <div class="link-dot ${dotClass}"></div>
          <a href="${l.url}" target="_blank">${l.label}</a>
        </div>`).join('')}
    </div>`;
  }).join('') + `</div>`;
}

let expandedId = null;
function toggleExpand(id) {
  const expandRow = document.getElementById(`expand-${id}`);
  const mainRow   = document.getElementById(`row-${id}`);
  if (expandedId && expandedId !== id) {
    const prev = document.getElementById(`expand-${expandedId}`);
    const prevRow = document.getElementById(`row-${expandedId}`);
    if (prev) { prev.classList.remove('open'); prevRow?.classList.remove('expanded'); }
  }
  const isOpen = expandRow.classList.contains('open');
  expandRow.classList.toggle('open', !isOpen);
  mainRow.classList.toggle('expanded', !isOpen);
  expandedId = isOpen ? null : id;
}

// ── Pagination ──
function renderPagination() {
  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('pagination');

  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  const pageNums = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - page) <= 2) {
      pageNums.push(i);
    } else if (pageNums[pageNums.length-1] !== '…') {
      pageNums.push('…');
    }
  }

  pag.innerHTML = `
    <button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>
    ${pageNums.map(p => p === '…'
      ? `<span class="page-info">…</span>`
      : `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`
    ).join('')}
    <button class="page-btn" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>›</button>
    <span class="page-info">${(page-1)*PAGE_SIZE+1}–${Math.min(page*PAGE_SIZE,total)} מתוך ${total}</span>
  `;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  page = p;
  expandedId = null;
  renderTable();
  renderPagination();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ── Count ──
function updateCount() {
  const el = document.getElementById('results-count');
  el.innerHTML = filtered.length === MAAMORIM.length
    ? `<strong>${MAAMORIM.length.toLocaleString()}</strong> מאמרים`
    : `<strong>${filtered.length.toLocaleString()}</strong> מתוך ${MAAMORIM.length.toLocaleString()}`;
}

// ── Init ──
buildYearButtons();
applyFilters();
</script>
