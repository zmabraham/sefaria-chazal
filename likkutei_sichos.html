<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ליקוטי שיחות — לייבשע ספרייה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdfaf5;
    --surface: #ffffff;
    --border: #e0d8c8;
    --accent: #8b5e3c;
    --accent-light: #f5ede0;
    --text: #2c1a0e;
    --text-muted: #7a6655;
    --footnote-bg: #faf5ec;
    --sup-color: #8b5e3c;
    --radius: 8px;
  }

  body {
    font-family: 'David Libre', 'Frank Ruhl Libre', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 17px;
    line-height: 1.75;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 18px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.6rem; font-weight: 700; }
  header p { font-size: 0.82rem; opacity: 0.85; margin-top: 2px; }

  .layout {
    display: flex;
    height: calc(100vh - 68px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    min-width: 200px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-controls {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--accent-light);
  }
  .search-box {
    width: 100%;
    padding: 7px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    background: white;
    color: var(--text);
    direction: rtl;
    margin-bottom: 7px;
  }
  .search-box:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .vol-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    max-height: 80px;
    overflow-y: auto;
  }
  .vol-btn {
    padding: 2px 7px;
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    transition: all 0.12s;
  }
  .vol-btn:hover { background: var(--accent-light); border-color: var(--accent); }
  .vol-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .vol-btn.all-btn { font-weight: 700; }

  .sicha-list { overflow-y: auto; flex: 1; padding: 6px 0; }
  .vol-group-header {
    padding: 5px 13px 3px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    background: var(--accent-light);
    border-bottom: 1px solid var(--border);
  }
  .sicha-item {
    padding: 8px 13px;
    cursor: pointer;
    border-bottom: 1px solid #f5f0e8;
    font-size: 15px;
    line-height: 1.35;
    transition: background 0.1s;
  }
  .sicha-item:hover { background: var(--accent-light); }
  .sicha-item.active { background: var(--accent); color: white; }
  .sicha-item .stitle { font-weight: 600; }
  .sicha-item .spage { font-size: 11px; opacity: 0.6; }

  /* ── Content ── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px 44px;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
  }
  .empty-state { text-align: center; margin-top: 80px; color: var(--text-muted); }
  .empty-state h2 { font-size: 1.4rem; color: var(--accent); margin-bottom: 8px; }

  .sicha-view { animation: fadeIn 0.18s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

  .sicha-header {
    margin-bottom: 26px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--border);
  }
  .sicha-header h2 { font-size: 1.75rem; color: var(--accent); }
  .sicha-meta {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    font-size: 13px; color: var(--text-muted); margin-top: 5px;
  }
  .sicha-meta a {
    color: var(--accent); text-decoration: none; font-size: 12px;
    border: 1px solid var(--accent); padding: 2px 8px; border-radius: 4px;
    transition: all 0.12s; direction: ltr;
  }
  .sicha-meta a:hover { background: var(--accent); color: white; }

  .main-text { font-size: 17.5px; line-height: 1.9; margin-bottom: 36px; }
  .main-text p { margin-bottom: 0.95em; text-align: justify; }
  .main-text sup {
    font-size: 0.63em;
    color: var(--sup-color);
    cursor: pointer;
    font-weight: 700;
    vertical-align: super;
    line-height: 1;
    transition: color 0.1s;
  }
  .main-text sup:hover { color: #c0392b; text-decoration: underline; }
  .main-text sup.hl { background: #ffe58a; padding: 0 2px; border-radius: 2px; }

  .footnotes-section {
    border-top: 2px solid var(--border);
    padding-top: 22px;
  }
  .fn-label {
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px;
  }
  .fn-content {
    background: var(--footnote-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.7;
  }
  .fn-content p { margin-bottom: 0.55em; }
  .fn-content p:last-child { margin-bottom: 0; }
  .fn-hl { background: #fff3cd; border-radius: 3px; padding: 1px 3px; transition: background 0.5s; }

  .no-text {
    color: var(--text-muted); font-style: italic; text-align: center;
    padding: 36px; border: 1px dashed var(--border); border-radius: var(--radius); margin: 16px 0;
  }
  .no-text a { color: var(--accent); }
  .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 1.1rem; }

  @media (max-width: 768px) {
    .sidebar { width: 240px; }
    .content-area { padding: 20px 16px; }
    .main-text { font-size: 16px; }
  }
  @media (max-width: 560px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: 200px; min-width: unset; }
    .content-area { max-width: 100%; }
  }
  .sicha-list::-webkit-scrollbar, .content-area::-webkit-scrollbar { width: 5px; }
  .sicha-list::-webkit-scrollbar-thumb, .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>ליקוטי שיחות</h1>
  <p>כ"ק אדמו"ר — 39 כרכים • 1,193 שיחות</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-controls">
      <input type="text" class="search-box" id="searchBox"
             placeholder="🔍 חפש שיחה..." oninput="filterSichos()">
      <div class="vol-filter" id="volFilter"></div>
    </div>
    <div class="sicha-list" id="sichaList"></div>
  </aside>

  <main class="content-area" id="contentArea">
    <div class="empty-state">
      <h2>ליקוטי שיחות</h2>
      <p>בחר שיחה מהרשימה משמאל</p>
    </div>
  </main>
</div>

<script>
let TOC = {};
let activeVol = 'all';
let activeSichaKey = null;
const volCache = {};

const HE_NUMS = ['א','ב','ג','ד','ה','ו','ז','ח','ט','י',
  'יא','יב','יג','יד','טו','טז','יז','יח','יט','כ',
  'כא','כב','כג','כד','כה','כו','כז','כח','כט','ל',
  'לא','לב','לג','לד','לה','לו','לז','לח','לט'];

async function init() {
  const r = await fetch('likkutei_sichos_data.json');
  TOC = await r.json();
  buildVolFilter();
  renderList();

  // Handle deep-link URL params: ?s=page_vol&fn=N
  const params = new URLSearchParams(window.location.search);
  const sParam = params.get('s');
  const fnParam = params.get('fn');
  if (sParam) {
    const [page, vol] = sParam.split('_');
    if (vol && TOC[vol]) {
      const sicha = TOC[vol].find(s => String(s.page) === page);
      if (sicha) {
        // Find and click the sidebar item
        setVol(vol);
        await new Promise(r => setTimeout(r, 50));
        const items = document.querySelectorAll('.sicha-item');
        for (const el of items) {
          if (el.querySelector('.spage')?.textContent === `עמ' ${page}`) {
            el.click();
            break;
          }
        }
        // Wait for render, then scroll to footnote ref
        if (fnParam) {
          await new Promise(r => setTimeout(r, 800));
          scrollToFn(parseInt(fnParam));
        }
      }
    }
  }
}

function buildVolFilter() {
  const c = document.getElementById('volFilter');
  const allBtn = document.createElement('button');
  allBtn.className = 'vol-btn all-btn active';
  allBtn.textContent = 'הכל'; allBtn.id = 'vol-all';
  allBtn.onclick = () => setVol('all');
  c.appendChild(allBtn);
  Object.keys(TOC).sort((a,b) => +a - +b).forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'vol-btn';
    btn.textContent = HE_NUMS[+v-1] || v;
    btn.title = `כרך ${v}`; btn.id = `vol-${v}`;
    btn.onclick = () => setVol(v);
    c.appendChild(btn);
  });
}

function setVol(v) {
  activeVol = v;
  document.querySelectorAll('.vol-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`vol-${v}`)?.classList.add('active');
  renderList();
}

function filterSichos() { renderList(); }

function renderList() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const c = document.getElementById('sichaList');
  c.innerHTML = '';
  const vols = activeVol === 'all'
    ? Object.keys(TOC).sort((a,b) => +a - +b) : [activeVol];

  vols.forEach(vol => {
    const filtered = TOC[vol].filter(s =>
      !q || s.title.toLowerCase().includes(q) || (s.summary||'').toLowerCase().includes(q));
    if (!filtered.length) return;

    const grp = document.createElement('div');
    const hdr = document.createElement('div');
    hdr.className = 'vol-group-header';
    hdr.textContent = `כרך ${vol}`;
    grp.appendChild(hdr);

    filtered.forEach(sicha => {
      const key = `${sicha.page}_${vol}`;
      const el = document.createElement('div');
      el.className = 'sicha-item' + (key === activeSichaKey ? ' active' : '');
      el.innerHTML = `<div class="stitle">${sicha.title}</div><div class="spage">עמ' ${sicha.page}</div>`;
      el.onclick = () => openSicha(vol, sicha, el);
      grp.appendChild(el);
    });
    c.appendChild(grp);
  });
}

async function openSicha(vol, sicha, el) {
  document.querySelectorAll('.sicha-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  activeSichaKey = `${sicha.page}_${vol}`;

  // Update URL without reload
  const url = new URL(window.location);
  url.searchParams.set('s', `${sicha.page}_${vol}`);
  url.searchParams.delete('fn');
  window.history.replaceState({}, '', url);

  const content = document.getElementById('contentArea');
  content.innerHTML = '<div class="loading">טוען...</div>';

  let textData = null;
  try { textData = await loadText(vol, sicha.page); } catch(e) {}
  renderSicha(vol, sicha, textData, content);
}

async function loadText(vol, page) {
  if (!volCache[vol]) {
    const r = await fetch(`ls_data/vol_${vol}.json`);
    if (!r.ok) throw new Error('not found');
    const arr = await r.json();
    volCache[vol] = {};
    arr.forEach(s => { volCache[vol][s.page] = s; });
  }
  return volCache[vol][page] || null;
}

function renderSicha(vol, toc, data, container) {
  const dachUrl = `https://dach.dev/book/likkutei-sichos/viewer/${toc.page}_${vol}`;

  let mainHtml = '';
  let fnHtml = '';

  if (data && data.mainText) {
    mainHtml = data.mainText.replace(
      /<sup>(\d+)<\/sup>/g,
      (_, n) => `<sup id="fn-ref-${n}" onclick="goFn(${n})" title="הערה ${n}">${n}</sup>`
    );
    fnHtml = data.footnotes || '';
  }

  container.innerHTML = `
    <div class="sicha-view">
      <div class="sicha-header">
        <h2>${toc.title}</h2>
        <div class="sicha-meta">
          <span>כרך ${vol} • עמ' ${toc.page}</span>
          <a href="${dachUrl}" target="_blank">↗ dach.dev</a>
        </div>
      </div>
      ${mainHtml
        ? `<div class="main-text">${mainHtml}</div>`
        : `<div class="no-text"><p>הטקסט אינו זמין</p><p><a href="${dachUrl}" target="_blank">פתח ב-dach.dev →</a></p></div>`}
      ${fnHtml
        ? `<div class="footnotes-section" id="fnSec">
             <div class="fn-label">הערות</div>
             <div class="fn-content" id="fnContent">${fnHtml}</div>
           </div>` : ''}
    </div>`;
  container.scrollTop = 0;
}

function scrollToFn(n) {
  // Scroll content area to the superscript with id="fn-ref-N" and highlight it
  const sup = document.getElementById(`fn-ref-${n}`);
  if (!sup) return;
  // Scroll within the content area
  const content = document.getElementById('contentArea');
  const supTop = sup.getBoundingClientRect().top - content.getBoundingClientRect().top + content.scrollTop;
  content.scrollTo({ top: supTop - 80, behavior: 'smooth' });
  sup.classList.add('hl');
  setTimeout(() => sup.classList.remove('hl'), 3500);
}

function goFn(n) {
  const sec = document.getElementById('fnSec');
  const cnt = document.getElementById('fnContent');
  if (!sec) return;
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  cnt.querySelectorAll('p').forEach(p => p.classList.remove('fn-hl'));
  cnt.querySelectorAll('p').forEach(p => {
    if (/^(\d+)[).]/.test(p.textContent.trim()) &&
        p.textContent.trim().match(/^(\d+)/)?.[1] === String(n)) {
      p.classList.add('fn-hl');
      setTimeout(() => p.classList.remove('fn-hl'), 3000);
    }
  });
  document.querySelectorAll('.main-text sup').forEach(s => s.classList.remove('hl'));
  document.querySelectorAll('.main-text sup').forEach(s => {
    if (s.textContent === String(n)) {
      s.classList.add('hl');
      setTimeout(() => s.classList.remove('hl'), 3000);
    }
  });
}

init();
</script>
</body>
</html>
